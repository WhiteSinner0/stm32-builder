name: Build Firmware

on:
  push:
    branches:
      - main
      - develop
      - dev/*
      - cicd
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 3 * * MON"
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Debug
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/whitesinner0/stm32-builder:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build firmware
        uses: whitesinner0/stm32-builder/action@main
        id: build
        with:
          build_configuration: Debug
          env_path: ./build.env

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-debug-${{ github.sha }}
          path: |
            *.elf
            *.bin
            *.hex
            *.map
            memory_report.md
          if-no-files-found: error

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/whitesinner0/stm32-builder:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build firmware
        uses: whitesinner0/stm32-builder/action@main
        id: build
        with:
          build_configuration: Release
          env_path: ./build.env

      - uses: actions/upload-artifact@v4
        with:
          name: firmware-release-${{ github.sha }}
          path: |
            *.elf
            *.bin
            *.hex
            *.map
            memory_report.md
          if-no-files-found: error

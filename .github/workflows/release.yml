name: Release on tag

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate:
    name: Validate tag vs build.env
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/whitesinner0/stm32-builder:latest
    outputs:
      proceed: ${{ steps.check.outputs.result }}
      version: ${{ steps.parse.outputs.version }}
      version_major: ${{ steps.parse.outputs.version_major }}
      version_minor: ${{ steps.parse.outputs.version_minor }}
      version_patch: ${{ steps.parse.outputs.version_patch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Parse build.env
        id: parse
        uses: whitesinner0/stm32-builder/action@main
        with:
          parse_only: "true"
          env_path: ./build.env

      - name: Validate tag on main and version match
        id: check
        run: |
          # If the tag is not directly on main, or the version numbers do not match, do not proceed
          RESULT="true"
          if ! git merge-base --is-ancestor ${{ github.ref_name }} origin/main; then
            RESULT="false"
            echo "Tag is not directly on main branch"
          fi

          TAG_VERSION_MAJOR=$(echo "${{ github.ref_name }}" | cut -d'.' -f1 | tr -d 'v')
          if [ "$TAG_VERSION_MAJOR" != "${{ steps.parse.outputs.version_major }}" ]; then
            RESULT="false"
            echo "Tag major version does not match the firmware major version"
          fi
          
          TAG_VERSION_MINOR=$(echo "${{ github.ref_name }}" | cut -d'.' -f2)
          if [ "$TAG_VERSION_MINOR" != "${{ steps.parse.outputs.version_minor }}" ]; then
            RESULT="false"
            echo "Tag minor version does not match the firmware minor version"
          fi

          TAG_VERSION_PATCH=$(echo "${{ github.ref_name }}" | cut -d'.' -f3)
          if [ "$TAG_VERSION_PATCH" != "${{ steps.parse.outputs.version_patch }}" ]; then
            RESULT="false"
            echo "Tag patch version does not match the firmware patch version"
          fi

          echo "result=$RESULT" >> $GITHUB_OUTPUT

  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.proceed == 'true'
    permissions:
      contents: write
    container:
      image: ghcr.io/whitesinner0/stm32-builder:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Release firmware
        id: build
        uses: whitesinner0/stm32-builder/action@main
        with:
          build_configuration: Release
          env_path: ./build.env

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.build.outputs.project_name }} ${{ github.ref_name }}"
          body_path: memory_report.md
          draft: true
          prerelease: false
          generate_release_notes: true
          files: |
            *.elf
            *.bin
            *.hex
            *.map
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
